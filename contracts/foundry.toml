[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
initia = "${RPC_URL}"

[etherscan]
initia = { key = "${INITIASCAN_API_KEY}", url = "${INITIASCAN_URL}" }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
